# After registering a name on build.snapcraft.io, commit an uncommented line:
name: endlesssky
version: '0.10.16' # just for humans, typically '1.2+git' or '1.3.2'
summary: Endless Sky is a sandbox-style space exploration game. # 79 char long summary
description: |
  Endless Sky is a 2D space trading and combat game similar to the classic
  Escape Velocity series. Explore other star systems. Earn money by trading,
  carrying passengers, or completing missions. Use your earnings to buy a
  better ship or to upgrade the weapons and engines on your current one. Blow
  up pirates. Take sides in a civil war. Or leave human space behind and hope
  to find friendly aliens whose culture is more civilized than your own.

  _More build details: https://github.com/Joker2770/endlesssky-snap_

grade: stable # must be 'stable' to release into candidate/stable channels
confinement: strict # use 'strict' once you have the right plugs and slots
base: core24

plugs:
  desktop:
    mount-host-font-cache: false
  gtk-3-themes:
    interface: content
    target: $SNAP/data-dir/themes
    default-provider: gtk-common-themes
  icon-themes:
    interface: content
    target: $SNAP/data-dir/icons
    default-provider: gtk-common-themes
  sound-themes:
    interface: content
    target: $SNAP/data-dir/sounds
    default-provider: gtk-common-themes
  gnome-46-2404:
    interface: content
    target: $SNAP/gnome-platform
    default-provider: gnome-46-2404
  gpu-2404:
    interface: content
    target: $SNAP/gpu-2404
    default-provider: mesa-2404

layout:
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/webkit2gtk-4.0:
    bind: $SNAP/gnome-platform/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/webkit2gtk-4.0
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/webkit2gtk-4.1:
    bind: $SNAP/gnome-platform/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/webkit2gtk-4.1
  /usr/share/xml/iso-codes:
    bind: $SNAP/gnome-platform/usr/share/xml/iso-codes
  /usr/share/libdrm:
    bind: $SNAP/gpu-2404/libdrm
  /usr/share/drirc.d:
    symlink: $SNAP/gpu-2404/drirc.d
  /usr/share/X11/XErrorDB:
    symlink: $SNAP/gpu-2404/X11/XErrorDB
  /usr/lib/$CRAFT_ARCH_TRIPLET/alsa-lib:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/alsa-lib
  /usr/share/alsa:
    bind: $SNAP/usr/share/alsa
  /usr/local/share/games:
    bind: $SNAP/usr/local/share/games
  /usr/local/share/icons:
    bind: $SNAP/usr/local/share/icons
  /usr/local/share/doc:
    bind: $SNAP/usr/local/share/doc
  /usr/local/share/man:
    bind: $SNAP/usr/local/share/man
  /usr/local/share/metainfo:
    bind: $SNAP/usr/local/share/metainfo
  /usr/lib/$CRAFT_ARCH_TRIPLET/dri:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/dri
  /usr/lib/$CRAFT_ARCH_TRIPLET/gtk-2.0/modules:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/gtk-2.0/modules

apps:
  endlesssky-pure:
    command: usr/local/games/endless-sky
    common-id: io.github.endless_sky.endless_pure
    environment:
      LIBGL_DRIVERS_PATH: "$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/dri"
      # pulseaudio
      LD_LIBRARY_PATH: "$LD_LIBRARY_PATH:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/blas:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/lapack:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/pulseaudio"
      SNAP_DESKTOP_RUNTIME: $SNAP/gnome-platform
      GTK_USE_PORTAL: '1'
    extensions: [gnome]
    plugs:
      - home
      - desktop
      - desktop-legacy
      - wayland
      - unity7
      - x11
      - opengl
      - alsa
      - audio-playback
      - removable-media
      - gsettings
      - process-control
      - hardware-observe
      - mount-observe
      - system-observe
      - system-trace
      - network
      - network-bind
  endlesssky:
    command: "usr/local/games/endless-sky -r $SNAP/usr/local/share/games/endless-sky/"
    common-id: io.github.endless_sky.endless_sky
    environment:
      LIBGL_DRIVERS_PATH: "$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/dri"
      # pulseaudio
      LD_LIBRARY_PATH: "$LD_LIBRARY_PATH:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/blas:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/lapack:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/pulseaudio"
      SNAP_DESKTOP_RUNTIME: $SNAP/gnome-platform
      GTK_USE_PORTAL: '1'
    extensions: [gnome]
    plugs:
      - home
      - desktop
      - desktop-legacy
      - wayland
      - unity7
      - x11
      - opengl
      - alsa
      - audio-playback
      - removable-media
      - gsettings
      - process-control
      - hardware-observe
      - mount-observe
      - system-observe
      - system-trace
      - network
      - network-bind

parts:
  endlesssky:
    plugin: cmake
    cmake-parameters:
      - "-DES_USE_VCPKG=OFF"
      - "-DCMAKE_INSTALL_PREFIX=/usr/local"
      - "-DCMAKE_BUILD_TYPE=Release"
      - "-DENABLE_TESTING=OFF"
      - "-DBUILD_TESTING=OFF"
    source: "https://github.com/endless-sky/endless-sky.git"
    source-depth: 1
    source-branch: master
    source-type: git
    build-packages:
      - gcc
      - g++
      - make
      - catch2
      - libavif-dev
      - libflac++-dev
      - libsdl2-dev
      - libpng-dev
      - libjpeg-dev
      - libgl1-mesa-dev
      - libglew-dev
      - libopenal-dev
      - libmad0-dev
      - libminizip-dev
      - uuid-dev
    stage-packages:
      - libavif16
      - libflac++10
      - libsdl2-2.0-0
      - libpng16-16t64
      - libjpeg8
      - libgl1
      - libglew2.2
      - libopenal1
      - libopengl0
      - libmad0
      - libminizip1t64

